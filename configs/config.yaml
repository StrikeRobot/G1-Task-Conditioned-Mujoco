sim:
  scene_xml: "scene/scene.xml"      # loaded via sim/loader.py (MjSpec) — do NOT edit the file
  render_every: 16                  # ~31 Hz RGB+depth (dt 0.002)
  lidar_every: 50                   # 10 Hz lidar + SLAM + nav
  cam_name: "head_cam"              # injected at runtime
  cam_body: "torso_link"            # body the camera is attached to; loader falls back to pelvis if missing
  cam_pos: [0.08, 0.0, 0.45]        # offset relative to the body (facing forward, tilted down 35°)
  cam_pitch_down_deg: 35.0
  cam_fovy: 58.0
  img_w: 640
  img_h: 480
  spawn_pos: [-4.7279, -0.2254, 0.79]   # exact original robot position in the scene
  lidar_mount_body: "torso_link"        # body origin for lidar raycasting

policy:
  # G1_deploy loco/policy_29dof.pt (TorchScript) — turns in place + stable on
  # the full 29-DOF body. Obs 96, scales all 1.0, PD gains/defaults baked into
  # locomotion/policy.py (LocoMode.yaml BFS order).
  policy_path: "third_party/g1_loco/policy_29dof.pt"
  control_dt: 0.02                  # 50 Hz -> decimation = control_dt / sim dt
  action_scale: 0.25
  cmd_limits: { vx: [-0.4, 0.7], vy: [-0.4, 0.4], wz: [-1.57, 1.57] }
  fall_tilt_g: -0.5                 # gravity_z body frame > -0.5 (~>60°) => fallen

teleop: { vx: 0.6, vy: 0.4, wz: 1.2 }

lidar:
  n_rays: 360
  max_range: 8.0
  min_range: 0.40                   # drop self-hits on the robot body
  mount_z_offset: 0.1

depth: { near: 0.3, far: 8.0 }

slam:
  size_m: [24.0, 18.0]
  resolution: 0.05
  l_occ: 0.85
  l_free: -0.4
  l_clamp: 4.0
  match_window_xy: 0.15
  match_window_th: 0.08
  odom_noise: { v: 0.03, w: 0.02, bias_w: 0.002 }

nav:
  robot_radius: 0.35
  lookahead: 0.6
  v_max: 0.5
  w_max: 1.0                        # policy turns in place; allow brisk yaw
  goal_tol: 0.3
  occ_threshold: 0.7
  # Light scan loop from spawn (-4.73,-0.22) around the area with the cup (-0.16,-3.83).
  # Avoid the Storage Case cabinet (-2.49,-1.55); use wide curved segments (~>=1.5m radius).
  patrol_waypoints:
    - [-3.0, -0.3]    # move east along the corridor, in front of the cabinet
    - [-1.5, -2.5]    # curve south-east into the open area south of the cabinet
    - [-0.3, -3.3]    # approach the cup (~0.5m) so the camera can catch it
    - [-2.0, -3.5]    # scan west across the cup area
    - [-3.7, -1.3]    # loop up to the north-west
    - [-4.0, -0.8]    # close the loop near spawn

perception:
  classes: ["cup", "wrench", "screwdriver"]
  weights: "yolo26s.pt"
  conf: 0.35   # YOLO26 gives cup conf ~0.85-0.93 when seen; filter by class to remove false-positives
  rate_hz: 8
  dedupe_radius: 1.0

telegram: { retries: 3 }

web: { host: "0.0.0.0", port: 8000 }
